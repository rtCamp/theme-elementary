name: Test and Measure

# Thin caller that delegates CI to the shared rtCamp orchestrator
# (rtCamp/wp-shared-workflows). It runs detect-changes first, then the theme
# preset's lint / test / build jobs, each gated on the changed-file buckets.
on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - ready_for_review

permissions:
  contents: read

jobs:
  ci:
    uses: rtCamp/wp-shared-workflows/.github/workflows/wp-ci.yml@release/v1.0.0
    with:
      project-type: theme
      # PHPUnit matrix carried over from the previous workflow: PHP 8.2-8.4 x WP 6.5-7.0.
      php-versions: '["8.2", "8.3", "8.4"]'
      wp-versions: '["6.5", "6.6", "6.7", "6.8", "6.9", "7.0"]'
      # WordPress added PHP 8.4 support in 6.7.
      test-php-exclude: '[{"php": "8.4", "wp": "6.5"}, {"php": "8.4", "wp": "6.6"}]'
    secrets:
      # WP_FRAMEWORK_REPO_TEMP_TOKEN must have read access to both private repos:
      #   - rtCamp/wp-tooling   (detect-changes installs the interim CLI from it)
      #   - rtCamp/wp-framework (composer install in lint-php / test-php)
      wp-tooling-token: ${{ secrets.WP_FRAMEWORK_REPO_TEMP_TOKEN }}
      packages-token: ${{ secrets.WP_FRAMEWORK_REPO_TEMP_TOKEN }}
